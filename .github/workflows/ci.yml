name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install bats
      run: |
        sudo apt-get update
        sudo apt-get install -y bats

    - name: Install shellcheck
      run: |
        curl -sSL https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.x86_64.tar.xz | tar -xJ
        sudo mv shellcheck-v0.10.0/shellcheck /usr/local/bin/
    
    - name: Install shfmt
      run: |
        curl -sSL https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64 -o shfmt
        chmod +x shfmt
        sudo mv shfmt /usr/local/bin/
    
    - name: Lint with shellcheck
      run: shellcheck bashlight completions/bashlight

    - name: Check formatting with shfmt
      run: shfmt -d bashlight completions/bashlight
    
    - name: Run tests
      run: bats tests